server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-route
              uri: ${AUTH_SERVICE_URL}
              predicates:
                - Path=/api/auth/**

logging:
  level:
    org.springframework.cloud.gateway: TRACE

jwt:
  secret: ${JWT_SECRET_KEY}