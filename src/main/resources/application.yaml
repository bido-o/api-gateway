server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-route
              uri: ${AUTH_SERVICE_URL}
              predicates:
                - Path=/api/auth/**

            - id: google-route
              uri: https://www.google.com
              predicates:
                - Path=/**

logging:
  level:
    org.springframework.cloud.gateway: TRACE